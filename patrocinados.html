<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patrocinados - Nike Social</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />

  <script defer src="theme.js"></script>
</head>

<body class="bg-white dark:bg-black text-black dark:text-white font-[Montserrat] antialiased">

  <header class="w-full flex justify-between items-center px-6 py-4 border-b border-gray-300 dark:border-gray-700 backdrop-blur-md bg-white/60 dark:bg-black/40 sticky top-0 z-50">
    <a href="inicio.html" class="text-4xl font-black tracking-tight hover:opacity-70 transition">
      <span class="text-black dark:text-white drop-shadow-md">NIKE</span>
    </a>

    <nav class="hidden md:flex gap-8 font-semibold text-sm uppercase tracking-wide">
      <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white transition">Feed</a>
      <a href="patrocinados.html" class="text-orange-500 transition hover:text-orange-400">Patrocinados</a>
    </nav>

    <button id="themeToggle" class="px-3 py-1 border border-gray-300 dark:border-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" aria-label="Alternar tema">
      🌙
    </button>
  </header>

  <main class="max-w-6xl mx-auto px-4 md:px-6 py-10">
    <h1 class="text-4xl font-black mb-10 tracking-tight uppercase">Patrocinados da Nike</h1>

    <div class="grid-feed">

      <a href="https://www.instagram.com/cristiano/" target="_blank" class="group block post">
        <div class="h-64 overflow-hidden">
          <img src="https://www.shutterstock.com/image-photo/porto-portugal-11-15-2024-600nw-2547123911.jpg" alt="Cristiano Ronaldo" class="postImg">
        </div>
        <div class="p-4">
          <p class="postTitle">Cristiano Ronaldo</p>
        </div>
      </a>

      <a href="https://www.instagram.com/corinthians/" target="_blank" class="group block post">
        <div class="h-64 overflow-hidden">
          <img src="https://imgnike-a.akamaihd.net/strapi/nike/p3_epdp_camisa_III_desktop_7ce271e43c/p3_epdp_camisa_III_desktop_7ce271e43c.jpg" alt="Corinthians" class="postImg">
        </div>
        <div class="p-4">
          <p class="postTitle">Corinthians</p>
        </div>
      </a>

      <a href="https://www.instagram.com/brasil/" target="_blank" class="group block post">
        <div class="h-64 overflow-hidden">
          <img src="https://imgnike-a.akamaihd.net/360x360/0584200LA17.jpg" alt="Seleção Brasileira" class="postImg">
        </div>
        <div class="p-4">
          <p class="postTitle">Seleção Brasileira</p>
        </div>
      </a>

      <a href="https://www.instagram.com/ronaldinho/" target="_blank" class="group block post">
        <div class="h-64 overflow-hidden">
          <img src="https://imgnike-a.akamaihd.net/360x360/05899215A7.jpg" alt="Ronaldinho Gaúcho" class="postImg">
        </div>
        <div class="p-4">
          <p class="postTitle">Ronaldinho Gaúcho</p>
        </div>
      </a>

    </div>
  </main>

</body>
</html>
