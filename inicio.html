<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início - Nike Social</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script defer src="theme.js"></script>
</head>

<body class="bg-white dark:bg-black text-black dark:text-white font-[Montserrat] antialiased transition-colors duration-300">

  <header class="w-full flex justify-between items-center px-6 py-4 border-b border-gray-300 dark:border-gray-700 backdrop-blur-md bg-white/60 dark:bg-black/40 sticky top-0 z-50">
    
    <a href="inicio.html" class="text-4xl font-black tracking-tight hover:opacity-70 transition">
      <span class="text-orange-500 dark:text-white drop-shadow-md">NIKE</span>
    </a>

    <nav class="hidden md:flex gap-8 font-semibold text-sm uppercase tracking-wide">
      <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white transition">Feed</a>
      <a href="patrocinados.html" class="text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white transition">Patrocinados</a>
    </nav>

    <button id="themeToggle" class="px-3 py-1 border border-gray-300 dark:border-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" aria-label="Alternar tema">
      🌙
    </button>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-20 text-center flex flex-col items-center justify-center min-h-[calc(100vh-80px)]">

    <h1 class="text-5xl font-black mb-6 tracking-tight uppercase">
      Bem-vindo à Nike Social
    </h1>

    <p class="text-xl opacity-80 max-w-2xl mb-10 leading-relaxed">
      Aqui você acompanha lançamentos, atletas patrocinados, produtos oficiais 
      e conteúdos exclusivos sobre tudo que envolve o mundo Nike.
    </p>

    <div>
      <a href="index.html" class="inline-block px-8 py-4 border-2 border-black dark:border-white rounded-xl font-bold uppercase tracking-wider hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition duration-300">
        Entrar no Feed
      </a>
    </div>

  </main>

</body>
</html>
