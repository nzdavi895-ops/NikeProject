<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início - Nike Social</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte usada nas outras páginas -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css">

  <!-- Tema -->
  <script defer src="theme.js"></script>
</head>

<body class="bg-white dark:bg-black text-black dark:text-white font-[Montserrat]">

  <!-- HEADER igual ao index e patrocinados -->
  <header class="w-full flex justify-between items-center px-6 py-4 border-b border-gray-300 dark:border-gray-700
                 backdrop-blur-md bg-white/60 dark:bg-black/40 sticky top-0 z-50">

    <a href="inicio.html" class="text-4xl font-black tracking-tight hover:opacity-70 transition">
      <span class="text-orange-500 dark:text-white drop-shadow-md">NIKE</span>
    </a>

    <nav class="hidden md:flex gap-8 font-semibold text-sm uppercase tracking-wide">
      <a href="index.html" class="hover:text-gray-500 transition text-white-500">Feed</a>
      <a href="patrocinados.html" class="hover:text-gray-500 transition">Patrocinados</a>
    </nav>

    <button id="themeToggle" class="px-3 py-1 border rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition">
      🌙
    </button>
  </header>

  <!-- MAIN -->
  <main class="p-10 text-center">

    <h1 class="text-4xl font-black mb-4 tracking-tight">
      Bem-vindo à Nike Social
    </h1>

    <p class="text-lg opacity-80 max-w-2xl mx-auto">
      Aqui você acompanha lançamentos, atletas patrocinados, produtos oficiais
      e conteúdos exclusivos sobre tudo que envolve o mundo Nike.
    </p>

    <div class="mt-8">
      <a href="index.html"
         class="px-6 py-3 border border-black dark:border-white rounded-xl font-semibold uppercase tracking-wide
                hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
        Entrar no Feed
      </a>
    </div>

  </main>

</body>
</html>
